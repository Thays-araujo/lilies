<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recanto Roxo — casinha ao entardecer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- sprite compartilhado: gradientes e brilho usados por todos os lírios -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="petalGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="var(--lily-petal-shade)"/>
      <stop offset="100%" stop-color="var(--lily-petal)"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="var(--leaf-dark)"/>
      <stop offset="100%" stop-color="var(--leaf-light)"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d8"/>
      <stop offset="100%" stop-color="var(--lily-center)"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<div class="scene" id="scene">

  <!-- CÉU -->
  <div class="sky">
    <div class="stars" id="stars"></div>
    <div class="moon"></div>
  </div>

  <!-- MORROS AO FUNDO -->
  <svg class="hills hills-back" viewBox="0 0 1440 400" preserveAspectRatio="none">
    <path d="M0,200 C 240,120 480,260 720,180 C 960,100 1200,220 1440,150 L1440,400 L0,400 Z"></path>
  </svg>
  <svg class="hills hills-front" viewBox="0 0 1440 320" preserveAspectRatio="none">
    <path d="M0,180 C 200,240 420,120 700,190 C 980,260 1220,140 1440,200 L1440,320 L0,320 Z"></path>
  </svg>

  <!-- CANTEIRO DE LÍRIOS -->
  <div class="lily-garden" id="lilyGarden" aria-hidden="true"></div>

  <!-- sombra no chão sob a casa -->
  <div class="house-shadow"></div>

  <!-- CASINHA -->
  <div class="house">
    <svg viewBox="0 0 400 320" width="100%" height="100%" preserveAspectRatio="xMidYMax meet">
      <defs>
        <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#f9ecd4"/>
          <stop offset="100%" stop-color="#e2c79c"/>
        </linearGradient>
        <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c25a3c"/>
          <stop offset="100%" stop-color="#8a3722"/>
        </linearGradient>
        <linearGradient id="stoneGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a89a94"/>
          <stop offset="100%" stop-color="#7c6e69"/>
        </linearGradient>
        <clipPath id="roofClip">
          <polygon points="38,160 200,52 362,160 346,172 200,70 54,172"/>
        </clipPath>
        <pattern id="bricks" width="16" height="10" patternUnits="userSpaceOnUse">
          <rect width="16" height="10" fill="#7a2f1c"/>
          <rect width="7" height="4" x="0" y="0" fill="#96432a"/>
          <rect width="7" height="4" x="8" y="5" fill="#96432a"/>
        </pattern>
      </defs>

      <!-- fundação de pedra -->
      <rect x="55" y="268" width="290" height="28" rx="2" fill="url(#stoneGrad)"/>
      <g stroke="#5f544f" stroke-width="1" opacity="0.5">
        <line x1="70" y1="268" x2="70" y2="296"/>
        <line x1="105" y1="268" x2="105" y2="296"/>
        <line x1="150" y1="268" x2="150" y2="296"/>
        <line x1="195" y1="268" x2="195" y2="296"/>
        <line x1="240" y1="268" x2="240" y2="296"/>
        <line x1="285" y1="268" x2="285" y2="296"/>
        <line x1="325" y1="268" x2="325" y2="296"/>
      </g>

      <!-- paredes -->
      <rect x="65" y="150" width="270" height="120" fill="url(#wallGrad)"/>
      <g stroke="#d8bb8b" stroke-width="1" opacity="0.45">
        <line x1="95" y1="150" x2="95" y2="270"/>
        <line x1="130" y1="150" x2="130" y2="270"/>
        <line x1="165" y1="150" x2="165" y2="270"/>
        <line x1="235" y1="150" x2="235" y2="270"/>
        <line x1="270" y1="150" x2="270" y2="270"/>
        <line x1="305" y1="150" x2="305" y2="270"/>
      </g>

      <!-- telhado (com espessura e textura de telhas) -->
      <polygon points="38,160 200,52 362,160 346,172 200,70 54,172" fill="url(#roofGrad)"/>
      <g clip-path="url(#roofClip)" stroke="#6f2a19" stroke-width="1.4" opacity="0.55">
        <line x1="20" y1="95" x2="380" y2="95"/>
        <line x1="20" y1="112" x2="380" y2="112"/>
        <line x1="20" y1="129" x2="380" y2="129"/>
        <line x1="20" y1="146" x2="380" y2="146"/>
        <line x1="20" y1="163" x2="380" y2="163"/>
      </g>
      <polygon points="38,160 200,52 362,160 358,163 200,58 42,163" fill="#e08462" opacity="0.5"/>

      <!-- chaminé -->
      <rect x="255" y="18" width="34" height="95" fill="url(#bricks)"/>
      <rect x="249" y="10" width="46" height="12" fill="#5c2314"/>

      <!-- janela esquerda -->
      <g>
        <rect x="98" y="178" width="54" height="58" fill="var(--window-glow)" stroke="#fff7e0" stroke-width="4"/>
        <line x1="125" y1="178" x2="125" y2="236" stroke="#8a6a3c" stroke-width="3"/>
        <line x1="98" y1="207" x2="152" y2="207" stroke="#8a6a3c" stroke-width="3"/>
        <rect x="92" y="240" width="66" height="13" rx="2" fill="#5f4a34"/>
        <circle cx="106" cy="240" r="6" fill="#d9a0d0"/>
        <circle cx="122" cy="240" r="6" fill="#e9c9ff"/>
        <circle cx="138" cy="240" r="6" fill="#c688d8"/>
      </g>

      <!-- janela direita -->
      <g>
        <rect x="248" y="178" width="54" height="58" fill="var(--window-glow)" stroke="#fff7e0" stroke-width="4"/>
        <line x1="275" y1="178" x2="275" y2="236" stroke="#8a6a3c" stroke-width="3"/>
        <line x1="248" y1="207" x2="302" y2="207" stroke="#8a6a3c" stroke-width="3"/>
        <rect x="242" y="240" width="66" height="13" rx="2" fill="#5f4a34"/>
        <circle cx="256" cy="240" r="6" fill="#c688d8"/>
        <circle cx="272" cy="240" r="6" fill="#e9c9ff"/>
        <circle cx="288" cy="240" r="6" fill="#d9a0d0"/>
      </g>

      <!-- porta -->
      <path d="M172,270 L172,224 Q172,202 200,202 Q228,202 228,224 L228,270 Z" fill="#5a3825" stroke="#3e2517" stroke-width="2"/>
      <path d="M180,270 L180,224 Q180,210 200,210 Q220,210 220,224 L220,270 Z" fill="none" stroke="#3e2517" stroke-width="1.5" opacity="0.6"/>
      <line x1="200" y1="210" x2="200" y2="270" stroke="#3e2517" stroke-width="1.5" opacity="0.6"/>
      <circle cx="196" cy="217" r="9" fill="var(--window-glow)" opacity="0.85"/>
      <circle cx="212" cy="248" r="3" fill="#f0d9a8"/>

      <!-- degrau -->
      <rect x="160" y="270" width="80" height="9" rx="1.5" fill="#c9beb4"/>

      <!-- lanterna da varanda -->
      <line x1="150" y1="200" x2="150" y2="218" stroke="#3e2517" stroke-width="2"/>
      <rect x="143" y="218" width="14" height="16" rx="2" fill="#3e2517"/>
      <circle cx="150" cy="226" r="9" fill="var(--window-glow)" opacity="0.55"/>
      <circle cx="150" cy="226" r="4" fill="#fff3cc"/>
    </svg>

    <div class="smoke" id="smoke"></div>
  </div>

  <!-- VAGA-LUMES -->
  <div class="fireflies" id="fireflies" aria-hidden="true"></div>

  <!-- CAMPO DE GRAMA ROXA -->
  <div class="grass-field" id="grassField" aria-hidden="true"></div>

  <!-- TÍTULO -->
  <header class="title-card">
    <p class="eyebrow">um cantinho imaginário</p>
    <h1>Recanto&nbsp;Roxo</h1>
    <p class="subtitle">a grama dança, os lírios balançam — o vento nunca para por aqui.</p>
  </header>

  <!-- CONTROLE DE VENTO -->
  <div class="wind-control">
    <span class="wind-label">🍃 vento</span>
    <div class="wind-buttons" id="windButtons" role="group" aria-label="Intensidade do vento">
      <button data-wind="0.55" data-speed="0.7">brisa</button>
      <button data-wind="1" data-speed="1" class="active">vento</button>
      <button data-wind="1.9" data-speed="1.6">vendaval</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
